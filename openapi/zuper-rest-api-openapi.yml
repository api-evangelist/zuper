openapi: 3.0.3
info:
  title: Zuper REST API
  description: >-
    The Zuper REST API provides programmatic access to the Zuper field service
    management platform. It covers jobs, scheduling, route optimization, customers,
    organizations, assets, inventory, purchase orders, invoices, proposals, quotes,
    timesheets, projects, properties, service tasks, service contracts, webhooks,
    and communications. Authentication uses API keys passed via the x-api-key header.
    Region-specific base URLs are discovered by POSTing to the accounts endpoint.
  version: 1.0.0
  contact:
    name: Zuper Developer Support
    url: https://developers.zuper.co/discuss
  x-api-evangelist-ratings:
    design: 7
    consistency: 7
    documentation: 8
servers:
  - url: https://{dc_region}.zuperpro.com/api
    description: Region-specific API server (dc_region obtained from accounts endpoint)
    variables:
      dc_region:
        default: us1
        description: Data-center region identifier returned by the config endpoint
  - url: https://accounts.zuperpro.com/api
    description: Accounts / configuration endpoint
security:
  - ApiKeyAuth: []
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: API key generated from Zuper Settings > Developer Hub > API Keys
  parameters:
    PageParam:
      name: page
      in: query
      description: Page number (1-based)
      schema:
        type: integer
        default: 1
    CountParam:
      name: count
      in: query
      description: Number of records per page (max 1000)
      schema:
        type: integer
        default: 10
        maximum: 1000
    SortParam:
      name: sort
      in: query
      schema:
        type: string
        enum: [DESC, ASC]
        default: DESC
  schemas:
    AddressObject:
      type: object
      properties:
        street:
          type: string
        city:
          type: string
        state:
          type: string
        country:
          type: string
        zip_code:
          type: string
        geo_coordinates:
          type: object
          properties:
            latitude:
              type: number
            longitude:
              type: number
    ContactNo:
      type: object
      properties:
        mobile:
          type: string
        home:
          type: string
        work:
          type: string
    CustomField:
      type: object
      properties:
        label:
          type: string
        value:
          type: string
        type:
          type: string
        module_name:
          type: string
    PaginatedResponse:
      type: object
      properties:
        type:
          type: string
        total_records:
          type: integer
        current_page:
          type: integer
        total_pages:
          type: integer
    ErrorResponse:
      type: object
      properties:
        type:
          type: string
          example: error
        message:
          type: string
    Customer:
      type: object
      properties:
        customer_uid:
          type: string
          format: uuid
        customer_first_name:
          type: string
        customer_last_name:
          type: string
        customer_email:
          type: string
          format: email
        customer_company_name:
          type: string
        customer_contact_no:
          $ref: '#/components/schemas/ContactNo'
        customer_tags:
          type: array
          items:
            type: string
        customer_address:
          $ref: '#/components/schemas/AddressObject'
        customer_billing_address:
          $ref: '#/components/schemas/AddressObject'
        custom_fields:
          type: array
          items:
            $ref: '#/components/schemas/CustomField'
        has_sla:
          type: boolean
        accounts:
          type: object
          properties:
            ltv:
              type: integer
            receivables:
              type: integer
            credits:
              type: integer
        is_active:
          type: boolean
        is_portal_enabled:
          type: boolean
        has_card_on_file:
          type: boolean
        tax:
          type: object
          properties:
            tax_exempt:
              type: boolean
        created_at:
          type: string
          format: date-time
    Job:
      type: object
      properties:
        job_uid:
          type: string
          format: uuid
        job_title:
          type: string
        job_category:
          type: string
        job_priority:
          type: string
          enum: [URGENT, HIGH, MEDIUM, LOW]
        job_type:
          type: string
          enum: [NEW, REVISIT]
        job_description:
          type: string
        job_tags:
          type: array
          items:
            type: string
        scheduled_start_time:
          type: string
          format: date-time
        scheduled_end_time:
          type: string
          format: date-time
        due_date:
          type: string
          format: date-time
        assigned_to:
          type: array
          items:
            type: string
        assigned_to_team:
          type: array
          items:
            type: string
        customer_uid:
          type: string
          format: uuid
        assets:
          type: array
          items:
            type: string
        products:
          type: array
          items:
            type: string
        custom_fields:
          type: array
          items:
            $ref: '#/components/schemas/CustomField'
    Asset:
      type: object
      properties:
        asset_uid:
          type: string
          format: uuid
        asset_code:
          type: string
        asset_name:
          type: string
        asset_serial_number:
          type: string
        purchase_date:
          type: string
          format: date
        warranty_expiry_date:
          type: string
          format: date
        placed_in_service:
          type: string
          format: date
        useful_life:
          type: object
          properties:
            type:
              type: string
              enum: [MONTHS, YEARS, DAYS]
            value:
              type: integer
        customer:
          type: string
        property:
          type: string
        organization:
          type: string
        asset_location:
          $ref: '#/components/schemas/AddressObject'
    Invoice:
      type: object
      properties:
        invoice_uid:
          type: string
          format: uuid
        reference_no:
          type: string
        description:
          type: string
        invoice_date:
          type: string
          format: date-time
        due_date:
          type: string
          format: date-time
        customer:
          type: string
        organization:
          type: string
        property:
          type: string
        job:
          type: string
        line_items:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              quantity:
                type: number
              unit_price:
                type: number
              discount:
                type: number
              tax:
                type: number
              total:
                type: number
        sub_total:
          type: number
        tags:
          type: array
          items:
            type: string
        custom_fields:
          type: array
          items:
            $ref: '#/components/schemas/CustomField'
paths:
  /config:
    post:
      summary: Get Region-Specific Base URL
      operationId: getConfig
      description: >-
        POST your company login name to discover the dc_api_url (region-specific
        base URL) for all subsequent API calls. Must target https://accounts.zuperpro.com/api.
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [company_login]
              properties:
                company_login:
                  type: string
                  description: Your Zuper company login name
      responses:
        '200':
          description: Configuration details including dc_api_url
          content:
            application/json:
              schema:
                type: object
                properties:
                  dc_api_url:
                    type: string
                    description: Region-specific base API URL to use for all subsequent requests
  /customers:
    get:
      summary: Get All Customers
      operationId: getAllCustomers
      description: Retrieve a paginated list of customers with filtering and sorting options.
      tags:
        - Customers
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/CountParam'
        - $ref: '#/components/parameters/SortParam'
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [customer_first_name, customer_last_name, no_of_jobs, created_at]
            default: created_at
        - name: filter.keyword
          in: query
          schema:
            type: string
        - name: filter.city
          in: query
          schema:
            type: string
        - name: filter.zipcode
          in: query
          schema:
            type: string
        - name: filter.customer_tags
          in: query
          schema:
            type: string
        - name: filter.is_active
          in: query
          schema:
            type: boolean
        - name: filter.is_deleted
          in: query
          schema:
            type: boolean
        - name: filter.is_portal_enabled
          in: query
          schema:
            type: boolean
        - name: filter.from_date
          in: query
          schema:
            type: string
            format: date-time
        - name: filter.to_date
          in: query
          schema:
            type: string
            format: date-time
        - name: filter.updated_at_from
          in: query
          schema:
            type: string
            format: date-time
        - name: filter.updated_at_to
          in: query
          schema:
            type: string
            format: date-time
        - name: filter.customer_uid
          in: query
          schema:
            type: string
        - name: filter.customer_email
          in: query
          schema:
            type: string
        - name: filter.customer_organization
          in: query
          schema:
            type: string
        - name: filter.has_org
          in: query
          schema:
            type: boolean
        - name: filter.do_not_service
          in: query
          schema:
            type: boolean
        - name: filter.has_card_on_file
          in: query
          schema:
            type: boolean
        - name: filter.account_manager
          in: query
          schema:
            type: string
        - name: filter.created_by
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of customers
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Customer'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create a Customer
      operationId: createCustomer
      description: Create a new customer record.
      tags:
        - Customers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                customer_first_name:
                  type: string
                customer_last_name:
                  type: string
                customer_email:
                  type: string
                  format: email
                customer_company_name:
                  type: string
                customer_contact_no:
                  $ref: '#/components/schemas/ContactNo'
                customer_address:
                  $ref: '#/components/schemas/AddressObject'
                customer_billing_address:
                  $ref: '#/components/schemas/AddressObject'
                customer_tags:
                  type: array
                  items:
                    type: string
                custom_fields:
                  type: array
                  items:
                    $ref: '#/components/schemas/CustomField'
      responses:
        '200':
          description: Customer created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                  message:
                    type: string
                  customer_uid:
                    type: string
                    format: uuid
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /customers/{customer_uid}:
    get:
      summary: Get Customer Details
      operationId: getCustomerDetails
      description: Retrieve detailed information for a specific customer.
      tags:
        - Customers
      parameters:
        - name: customer_uid
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Customer details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '404':
          description: Customer not found
    put:
      summary: Update Customer
      operationId: updateCustomer
      description: Update an existing customer record.
      tags:
        - Customers
      parameters:
        - name: customer_uid
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Customer'
      responses:
        '200':
          description: Customer updated successfully
        '400':
          description: Bad request
    delete:
      summary: Delete Customer
      operationId: deleteCustomer
      description: Delete a customer record.
      tags:
        - Customers
      parameters:
        - name: customer_uid
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Customer deleted successfully
        '404':
          description: Customer not found
  /customers/{customer_uid}/summary:
    get:
      summary: Get Customer Summary
      operationId: getCustomerSummary
      description: Retrieve a financial and activity summary for a specific customer.
      tags:
        - Customers
      parameters:
        - name: customer_uid
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Customer summary
          content:
            application/json:
              schema:
                type: object
  /jobs:
    get:
      summary: Get Jobs
      operationId: getJobs
      description: Retrieve a paginated, filterable list of jobs.
      tags:
        - Jobs
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/CountParam'
        - $ref: '#/components/parameters/SortParam'
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [work_order_number, job_priority, scheduled_start_time, due_date]
            default: work_order_number
        - name: date_type
          in: query
          schema:
            type: string
            enum: [scheduled_date, created_date, current_status_updated_at]
            default: scheduled_date
        - name: filter.priority
          in: query
          schema:
            type: string
            enum: [URGENT, HIGH, MEDIUM, LOW]
        - name: filter.customer
          in: query
          schema:
            type: string
        - name: filter.category
          in: query
          schema:
            type: string
        - name: filter.keyword
          in: query
          schema:
            type: string
        - name: filter.job_tags
          in: query
          schema:
            type: string
        - name: filter.job_status
          in: query
          schema:
            type: string
        - name: filter.from_date
          in: query
          schema:
            type: string
            format: date-time
        - name: filter.to_date
          in: query
          schema:
            type: string
            format: date-time
        - name: filter.updated_at
          in: query
          schema:
            type: string
            format: date-time
        - name: filter.assigned_to
          in: query
          schema:
            type: string
        - name: filter.assigned_to_team
          in: query
          schema:
            type: string
        - name: filter.is_deleted
          in: query
          description: Show deleted jobs (max 90 days)
          schema:
            type: boolean
        - name: filter.is_invoiced
          in: query
          schema:
            type: boolean
        - name: filter.job_type
          in: query
          schema:
            type: string
            enum: [NEW, REVISIT]
        - name: filter.due_date_from
          in: query
          schema:
            type: string
            format: date-time
        - name: filter.due_date_to
          in: query
          schema:
            type: string
            format: date-time
        - name: filter.customer_feedback
          in: query
          schema:
            type: string
            enum: [HAPPY, NEUTRAL, UNHAPPY, VERY_HAPPY, VERY_UNHAPPY]
        - name: filter.asset
          in: query
          schema:
            type: string
        - name: filter.property
          in: query
          schema:
            type: string
        - name: filter.project
          in: query
          schema:
            type: string
        - name: filter.business_unit
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of jobs
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Job'
        '400':
          description: Bad request
    post:
      summary: Create a Job
      operationId: createJob
      description: Create a new job in the field service management system.
      tags:
        - Jobs
      parameters:
        - name: check_assignment_conflict
          in: query
          schema:
            type: boolean
            default: false
          description: Check for scheduling conflicts before creating
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [job_title, job_category]
              properties:
                job_title:
                  type: string
                job_category:
                  type: string
                job_priority:
                  type: string
                  enum: [URGENT, HIGH, MEDIUM, LOW]
                job_type:
                  type: string
                  enum: [NEW, REVISIT]
                job_description:
                  type: string
                job_tags:
                  type: array
                  items:
                    type: string
                scheduled_start_time:
                  type: string
                  format: date-time
                scheduled_end_time:
                  type: string
                  format: date-time
                due_date:
                  type: string
                  format: date-time
                assigned_to:
                  type: array
                  items:
                    type: string
                assigned_to_team:
                  type: array
                  items:
                    type: string
                customer_uid:
                  type: string
                  format: uuid
                customer:
                  type: object
                assets:
                  type: array
                  items:
                    type: string
                products:
                  type: array
                  items:
                    type: string
                skills:
                  type: array
                  items:
                    type: string
                attachments:
                  type: array
                  items:
                    type: object
                service_task:
                  type: string
                service_contract:
                  type: string
                custom_fields:
                  type: array
                  items:
                    $ref: '#/components/schemas/CustomField'
      responses:
        '200':
          description: Job created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                    example: success
                  message:
                    type: string
                    example: New Job Created successfully
                  job_uid:
                    type: string
                    format: uuid
                  customer_uid:
                    type: string
                    format: uuid
        '400':
          description: Bad request - customer or organization data required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /jobs/{job_uid}:
    get:
      summary: Get Job Details
      operationId: getJobDetails
      description: Retrieve detailed information for a specific job.
      tags:
        - Jobs
      parameters:
        - name: job_uid
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Job details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '404':
          description: Job not found
    put:
      summary: Update a Job
      operationId: updateJob
      description: Update an existing job record.
      tags:
        - Jobs
      parameters:
        - name: job_uid
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Job'
      responses:
        '200':
          description: Job updated successfully
        '400':
          description: Bad request
    delete:
      summary: Delete a Job
      operationId: deleteJob
      description: Delete a job record.
      tags:
        - Jobs
      parameters:
        - name: job_uid
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Job deleted successfully
        '404':
          description: Job not found
  /assets:
    get:
      summary: Get All Assets
      operationId: getAllAssets
      description: Retrieve a paginated list of assets.
      tags:
        - Assets
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/CountParam'
        - $ref: '#/components/parameters/SortParam'
      responses:
        '200':
          description: Paginated list of assets
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Asset'
        '400':
          description: Bad request
    post:
      summary: Create Asset
      operationId: createAsset
      description: Create a new asset record.
      tags:
        - Assets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [asset]
              properties:
                asset:
                  type: object
                  required: [asset_code, asset_name]
                  properties:
                    asset_code:
                      type: string
                    asset_name:
                      type: string
                    purchase_date:
                      type: string
                      format: date
                    warranty_expiry_date:
                      type: string
                      format: date
                    placed_in_service:
                      type: string
                      format: date
                    useful_life:
                      type: object
                      properties:
                        type:
                          type: string
                          enum: [MONTHS, YEARS, DAYS]
                        value:
                          type: integer
                    asset_category:
                      type: string
                    asset_product:
                      type: string
                    asset_serial_number:
                      type: string
                    asset_parts:
                      type: array
                      items:
                        type: object
                        properties:
                          quantity:
                            type: integer
                          serial_nos:
                            type: array
                            items:
                              type: string
                          product_id:
                            type: string
                    customer:
                      type: string
                    property:
                      type: string
                    organization:
                      type: string
                    asset_inspection_form:
                      type: string
                    parent_asset:
                      type: string
                    asset_location:
                      $ref: '#/components/schemas/AddressObject'
                    billing_address:
                      $ref: '#/components/schemas/AddressObject'
                asset_attachments:
                  type: array
                  items:
                    type: object
                    required: [file_name, url]
                    properties:
                      file_name:
                        type: string
                      url:
                        type: string
                      file_size:
                        type: integer
                      visible_to_customer:
                        type: boolean
                        default: false
      responses:
        '200':
          description: Asset created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                    example: success
                  message:
                    type: string
                    example: New asset Created successfully
                  data:
                    type: object
                    properties:
                      asset_uid:
                        type: string
                        format: uuid
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Invalid Organization UID
        '500':
          description: Server error
  /assets/{asset_uid}:
    get:
      summary: Get Asset Details
      operationId: getAssetDetails
      description: Retrieve detailed information for a specific asset.
      tags:
        - Assets
      parameters:
        - name: asset_uid
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Asset details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
        '404':
          description: Asset not found
    put:
      summary: Update Asset
      operationId: updateAsset
      description: Update an existing asset record.
      tags:
        - Assets
      parameters:
        - name: asset_uid
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Asset'
      responses:
        '200':
          description: Asset updated successfully
        '400':
          description: Bad request
    delete:
      summary: Delete Asset
      operationId: deleteAsset
      description: Delete an asset record.
      tags:
        - Assets
      parameters:
        - name: asset_uid
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Asset deleted successfully
        '404':
          description: Asset not found
  /invoice:
    get:
      summary: Get All Invoices
      operationId: getAllInvoices
      description: Retrieve a paginated list of invoices.
      tags:
