apis:
  - name: Zuper REST API
    description: >-
      The Zuper REST API provides access to all field service management data
      and operations, including job creation and management, scheduling, route
      optimization, customer and organization management, inventory, purchase
      orders, invoices, proposals, quotes, timesheets, assets, contracts, teams,
      and communications. The API uses API key authentication via the x-api-key
      header and communicates over HTTPS using JSON with ISO 8601 date formats.
      Region-specific base URLs are retrieved dynamically from the accounts
      endpoint.
