name: Zuper
description: >-
  Zuper is an intelligent field service management platform that consolidates
  job scheduling, dispatching, customer management, invoicing, timesheets, and
  field team operations into a single AI-powered operating system. The Zuper
  REST API gives developers programmatic access to all platform data, enabling
  seamless integration with third-party systems across jobs, assets, projects,
  inventory, contracts, and financials. Authentication is handled via API keys
  transmitted through the x-api-key header, with region-specific base URLs
  discovered at runtime. The API supports over 300 endpoints organized across
  functional areas including customers, jobs, scheduling, proposals, purchase
  orders, timesheets, teams, and communications. Zuper also provides a
  server-side SDK via npm (zuper-sdk) and a Model Context Protocol (MCP) server
  for AI agent integration.
